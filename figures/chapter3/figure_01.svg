<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<defs>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
<path d="M2,2 L10,6 L2,10 Z" fill="#3B7F50"/>
</marker>
<marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
<path d="M2,2 L10,6 L2,10 Z" fill="#546A7B"/>
</marker>
</defs>
<rect width="1600" height="900" fill="#fbfaf7"/>
<text x="64" y="70" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#263238" text-anchor="start">Indoor layout as a compact 2D scene model</text>
<text x="64" y="108" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#5d6b78" text-anchor="start">Room shell, openings, furniture footprints, and metadata share one millimeter coordinate system</text>
<line x1="130" y1="755" x2="130" y2="175" stroke="#374957" stroke-width="3"/>
<line x1="130" y1="755" x2="810" y2="755" stroke="#374957" stroke-width="3"/>
<line x1="130" y1="175" x2="130" y2="175" stroke="#374957" stroke-width="3"/>
<line x1="130" y1="175" x2="130" y2="175" stroke="#374957" stroke-width="3"/>
<line x1="130" y1="175" x2="130" y2="175" stroke="#374957" stroke-width="3" marker-end="url(#arrow-blue)"/>
<line x1="810" y1="755" x2="810" y2="755" stroke="#374957" stroke-width="3" marker-end="url(#arrow-blue)"/>
<text x="108" y="804" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#64727e" text-anchor="start">0</text>
<text x="795" y="790" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#64727e" text-anchor="start">x (mm)</text>
<text x="150" y="170" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#64727e" text-anchor="start">y (mm)</text>
<polygon points="210,235 760,235 760,480 695,480 695,615 565,615 565,720 210,720" fill="#EDF6FF" stroke="#2D82C7" stroke-width="5"/>
<line x1="420" y1="235" x2="520" y2="235" stroke="#F27D45" stroke-width="10" stroke-linecap="round"/>
<line x1="760" y1="380" x2="760" y2="465" stroke="#F27D45" stroke-width="10" stroke-linecap="round"/>
<line x1="500" y1="320" x2="595" y2="320" stroke="#47A9C6" stroke-width="5" stroke-dasharray="24 24"/>
<text x="465" y="218" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#B76034" text-anchor="start">door / window opening</text>
<text x="710" y="495" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#B76034" text-anchor="start">opening segment</text>
<text x="235" y="270" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#2D82C7" text-anchor="start"><tspan>P = (v</tspan><tspan baseline-shift="sub" font-size="13">1</tspan><tspan>, ..., v</tspan><tspan baseline-shift="sub" font-size="13">N</tspan><tspan>)</tspan></text>
<rect x="270" y="330" width="175" height="135" rx="10" fill="#D8F2DC" stroke="#54A568" stroke-width="4"/>
<text x="320" y="382" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#263238" text-anchor="start">sofa</text>
<text x="307" y="414" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#263238" text-anchor="start"><tspan>R</tspan><tspan baseline-shift="sub" font-size="13">i</tspan><tspan>(θ</tspan><tspan baseline-shift="sub" font-size="13">i</tspan><tspan>)</tspan></text>
<rect x="515" y="325" width="120" height="95" rx="10" fill="#FFE8A7" stroke="#B9832D" stroke-width="4"/>
<text x="545" y="370" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#263238" text-anchor="start">coffee</text>
<text x="548" y="393" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#263238" text-anchor="start">table</text>
<rect x="270" y="535" width="120" height="105" rx="9" fill="#FFE4E0" stroke="#D8665B" stroke-width="4"/>
<text x="309" y="596" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#263238" text-anchor="start">chair</text>
<rect x="600" y="525" width="150" height="70" rx="10" fill="#E8DDFF" stroke="#8B66D9" stroke-width="4"/>
<text x="632" y="570" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#263238" text-anchor="start">TV unit</text>
<line x1="360" y1="466" x2="360" y2="524" stroke="#3B7F50" stroke-width="4" marker-end="url(#arrow)"/>
<text x="380" y="506" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#3B7F50" text-anchor="start"><tspan>front</tspan><tspan baseline-shift="sub" font-size="11">i</tspan></text>
<rect x="940" y="220" width="525" height="490" rx="18" fill="#FFFFFF" stroke="#B8C6D1" stroke-width="3"/>
<text x="980" y="275" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#263238" text-anchor="start">Layout tuple</text>
<text x="980" y="325" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#263238" text-anchor="start"><tspan>L = (P, G, O, A)</tspan></text>
<text x="980" y="370" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#263238" text-anchor="start">P: room polygon vertices</text>
<text x="980" y="405" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#263238" text-anchor="start">G: doors/windows on wall edges</text>
<text x="980" y="445" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#263238" text-anchor="start"><tspan>O = {o</tspan><tspan baseline-shift="sub" font-size="12">1</tspan><tspan>, ..., o</tspan><tspan baseline-shift="sub" font-size="12">N</tspan><tspan>}: placed objects</tspan></text>
<text x="980" y="500" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#263238" text-anchor="start"><tspan>o</tspan><tspan baseline-shift="sub" font-size="12">i</tspan><tspan> = (type</tspan><tspan baseline-shift="sub" font-size="12">i</tspan><tspan>, c</tspan><tspan baseline-shift="sub" font-size="12">i</tspan><tspan>, s</tspan><tspan baseline-shift="sub" font-size="12">i</tspan><tspan>, θ</tspan><tspan baseline-shift="sub" font-size="12">i</tspan><tspan>, h</tspan><tspan baseline-shift="sub" font-size="12">i</tspan><tspan>, front</tspan><tspan baseline-shift="sub" font-size="12">i</tspan><tspan>, meta</tspan><tspan baseline-shift="sub" font-size="12">i</tspan><tspan>)</tspan></text>
<text x="980" y="538" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#263238" text-anchor="start"><tspan>c</tspan><tspan baseline-shift="sub" font-size="12">i</tspan><tspan> = (x</tspan><tspan baseline-shift="sub" font-size="12">i</tspan><tspan>, y</tspan><tspan baseline-shift="sub" font-size="12">i</tspan><tspan>),   s</tspan><tspan baseline-shift="sub" font-size="12">i</tspan><tspan> = (w</tspan><tspan baseline-shift="sub" font-size="12">i</tspan><tspan>, d</tspan><tspan baseline-shift="sub" font-size="12">i</tspan><tspan>)</tspan></text>
<text x="980" y="615" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5d6b78" text-anchor="start">The same representation feeds editing, solving,</text>
<text x="980" y="645" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5d6b78" text-anchor="start">3D preview, image conditioning, and evaluation.</text>
</svg>