<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="850" viewBox="0 0 1400 850">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#111"/>
    </marker>
  </defs>
  <style>
    text { font-family: "Times New Roman", serif; fill: #111; }
    .head { font-size: 27px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
    .step { font-size: 24px; }
    .box { stroke: #111; stroke-width: 2.2; fill: #fff; rx: 9; }
    .life { stroke: #555; stroke-width: 1.7; stroke-dasharray: 8 7; }
    .msg { stroke: #111; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
    .return { stroke: #111; stroke-width: 2.1; stroke-dasharray: 8 6; fill: none; marker-end: url(#arrow); }
  </style>

  <rect class="box" x="45" y="30" width="180" height="62"/><text class="head" x="135" y="61">User</text>
  <rect class="box" x="315" y="30" width="190" height="62"/><text class="head" x="410" y="61">Frontend</text>
  <rect class="box" x="600" y="30" width="200" height="62"/><text class="head" x="700" y="61">Backend API</text>
  <rect class="box" x="895" y="30" width="230" height="62"/><text class="head" x="1010" y="61">Image Provider</text>
  <rect class="box" x="1215" y="30" width="150" height="62"/><text class="head" x="1290" y="61">Storage</text>

  <line class="life" x1="135" y1="92" x2="135" y2="800"/>
  <line class="life" x1="410" y1="92" x2="410" y2="800"/>
  <line class="life" x1="700" y1="92" x2="700" y2="800"/>
  <line class="life" x1="1010" y1="92" x2="1010" y2="800"/>
  <line class="life" x1="1290" y1="92" x2="1290" y2="800"/>

  <line class="msg" x1="135" y1="155" x2="410" y2="155"/>
  <text class="step" x="165" y="140">1. Select layout, camera, and visual preset</text>
  <line class="msg" x1="410" y1="250" x2="700" y2="250"/>
  <text class="step" x="430" y="235">2. Send snapshot and layout metadata</text>
  <line class="msg" x1="700" y1="345" x2="700" y2="390"/>
  <text class="step" x="735" y="365">3. Compile guides, contracts, and prompt package</text>
  <line class="msg" x1="700" y1="455" x2="1010" y2="455"/>
  <text class="step" x="725" y="440">4. Request text-and-image-conditioned generation</text>
  <line class="return" x1="1010" y1="550" x2="700" y2="550"/>
  <text class="step" x="735" y="535">5. Return perspective image and provider metadata</text>
  <line class="msg" x1="700" y1="645" x2="1290" y2="645"/>
  <text class="step" x="805" y="630">6. Save render linked to the source layout</text>
  <line class="return" x1="700" y1="735" x2="410" y2="735"/>
  <text class="step" x="440" y="720">7. Return saved render artifact</text>
  <line class="return" x1="410" y1="795" x2="135" y2="795"/>
  <text class="step" x="175" y="780">8. Display generated image</text>
</svg>
